name: Export Game

# 触发条件：推送 tag 或手动触发
on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:  # 允许手动触发

# 设置权限
permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            extension: exe
          - platform: linux
            runner: ubuntu-latest
            extension: x86_64
          - platform: mac
            runner: macos-latest
            extension: app

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Godot 环境
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.6.1
          release_type: stable

      # 3. 导出游戏
      - name: Export Game
        run: |
          godot --headless --export-release "${{ matrix.platform }}" ./build/fbv0.1.${{ matrix.extension }}

      # 4. 上传构建产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: build/

  release:
    name: Create Release
    needs: export
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/**/*
          generate_release_notes: true
