name: Export Game

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-windows:
    name: Export Windows
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.6.1.stable ~/.local/share/godot/export_templates/4.6.1.stable

      - name: Import project
        run: godot --headless --import

      - name: Export Windows
        run: godot --headless --export-release "windows" .

      - name: List files
        run: ls -la *.exe *.pck 2>/dev/null || ls -la

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            fbv0.1.exe
            fbv0.1.pck
          if-no-files-found: error

  export-linux:
    name: Export Linux
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.6.1.stable ~/.local/share/godot/export_templates/4.6.1.stable

      - name: Import project
        run: godot --headless --import

      - name: Export Linux
        run: godot --headless --export-release "linux" .

      - name: List files
        run: ls -la fbv0.1.* 2>/dev/null || ls -la

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            fbv0.1.x86_64
            fbv0.1.pck
          if-no-files-found: error

  release:
    name: Create Release
    needs: [export-windows, export-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: release/

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: release/

      - name: List files
        run: ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true