name: Export Game

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            preset: windows
            artifact: fbv0.1.exe
          - platform: linux
            runner: ubuntu-latest
            preset: linux
            artifact: fbv0.1.x86_64
          # macOS 暂时禁用（内存不足问题）
          # - platform: mac
          #   runner: macos-latest
          #   preset: mac
          #   artifact: fbv0.1.app.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.6.1
          include-templates: true

      - name: Import Project
        run: godot --headless --import

      - name: Build
        run: |
          mkdir -p build
          godot --headless --export-release "${{ matrix.preset }}" build/${{ matrix.artifact }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: build/

  release:
    name: Create Release
    needs: export
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/**/*
          generate_release_notes: true
