name: Export Game

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            preset: windows
            artifact: fbv0.1.exe
          - platform: linux
            runner: ubuntu-latest
            preset: linux
            artifact: fbv0.1.x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.6.1
          include-templates: true

      - name: Debug - List files
        run: ls -la

      - name: Import Project
        run: godot --headless --import || true

      - name: Debug - Check export presets
        run: cat export_presets.cfg

      - name: Build
        run: |
          godot --headless --export-release "${{ matrix.preset }}" ${{ matrix.artifact }} --verbose

      - name: Debug - List output
        run: ls -la

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    name: Create Release
    needs: export
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/
          merge-multiple: true

      - name: List files
        run: ls -laR build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*
          generate_release_notes: true
